<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decisão do Caio ❤️</title>
    <link rel="stylesheet" href="decisao.css">
</head>
<body>

    <!-- Fotos flutuando (fundo) -->
    <div class="hearts-container">

        <img src="img/img1.jpeg" class="heart-img" alt="memória 1">
        <img src="img/img2.jpeg" class="heart-img" alt="memória 2">
        <img src="img/img3.jpeg" class="heart-img" alt="memória 3">
        <img src="img/img4.jpeg" class="heart-img" alt="memória 4">

    </div>

    <!-- Conteúdo central -->
    <div class="final-choice">

        <h2>Depois de tudo que você leu...</h2>

        <button id="believeBtn">
            Eu vou acreditar pela última vez ❤️
        </button>

        <button id="stopBtn">
            Por favor, para.
        </button>

        <p id="resultMessage"></p>

    </div>

    <script src="decisao.js"></script>

</body>
</html>
